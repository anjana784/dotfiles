# =============================================================================
# Tmux Configuration
# Recreated from ~/Downloads/tmux.back/ plugin setup
# =============================================================================

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g history-limit 50000
set -g display-time 3000
set -g escape-time 10
set -g focus-events on
set -g detach-on-destroy off
set -g allow-passthrough on

# Vi-style copy mode
set -g mode-keys vi
set -g status-keys vi

# -----------------------------------------------------------------------------
# Keybindings — Prefix
# -----------------------------------------------------------------------------
# Default prefix is C-b
# Uncomment below to use C-s or C-a instead:
# set -g prefix C-s
# unbind C-b

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded ✓"

# Send prefix to nested tmux session (prefix + C-b)
bind C-b send-prefix

# -----------------------------------------------------------------------------
# Keybindings — Splits
# -----------------------------------------------------------------------------
# Vertical split (prefix + |)
bind "|" split-window -h -c "#{pane_current_path}"
# Horizontal split (prefix + -)
bind "-" split-window -v -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# Keybindings — Pane Navigation & Resizing
# -----------------------------------------------------------------------------
# Pane navigation: Ctrl + h/j/k/l (handled by vim-tmux-navigator below)
#
# Resize panes with prefix + h/j/k/l (repeatable — hold prefix once, tap key)
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Break pane into new window with prefix + !
bind "!" break-pane

# -----------------------------------------------------------------------------
# Keybindings — Windows
# -----------------------------------------------------------------------------
bind "&" kill-window
bind x kill-pane
bind "," command-prompt -I "#W" "rename-window -- '%%'"
bind "'" command-prompt -p index "select-window -t '%%'"

# Move windows with Shift+Left/Right
bind -n S-Left  swap-window -t -1
bind -n S-Right swap-window -t +1

# -----------------------------------------------------------------------------
# Catppuccin Theme Options
# (Set BEFORE the plugin is loaded)
# -----------------------------------------------------------------------------
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Pane styling
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_border_status "off"

# -----------------------------------------------------------------------------
# Load Catppuccin Theme Directly
# (Must be before setting status-left/right)
# -----------------------------------------------------------------------------
run-shell ~/.tmux/plugins/tmux/catppuccin.tmux

# -----------------------------------------------------------------------------
# Status Line — Left Side
# -----------------------------------------------------------------------------
set -g status-left "#{E:@catppuccin_status_session}"
set -ag status-left "#{E:@catppuccin_status_directory}"

# -----------------------------------------------------------------------------
# Status Line — Right Side (matches old config)
# -----------------------------------------------------------------------------
set -g status-right "#{E:@catppuccin_status_date_time}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_user}"

# Optional: uncomment to add more modules from your old setup
# (some require additional plugins — see below)
# set -ag status-right "#{E:@catppuccin_status_uptime}"
# set -ag status-right "#{E:@catppuccin_status_battery}"   # requires tmux-battery plugin
# set -ag status-right "#{E:@catppuccin_status_cpu}"       # requires tmux-cpu plugin
# set -ag status-right "#{E:@catppuccin_status_load}"      # requires tmux-loadavg plugin
# set -ag status-right "#{E:@catppuccin_status_weather}"   # requires tmux-weather plugin
# set -ag status-right "#{E:@catppuccin_status_gitmux}"    # requires gitmux binary

set -g status-right-length 200
set -g status-left-length 100
set -g status-interval 30
set -g status-position top

# -----------------------------------------------------------------------------
# vim-tmux-navigator Configuration
# -----------------------------------------------------------------------------
# When in a vim pane, C-h/j/k/l are sent to vim
# When in a plain tmux pane, C-h/j/k/l move between panes
set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev "C-\\"

# Load vim-tmux-navigator directly for reliable keybinding setup
run-shell ~/.tmux/plugins/vim-tmux-navigator/vim-tmux-navigator.tmux

# -----------------------------------------------------------------------------
# TPM — Tmux Plugin Manager
# (List additional plugins here; tpm handles install/update)
# -----------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'

# -----------------------------------------------------------------------------
# Initialize TPM (must be at the very bottom)
# -----------------------------------------------------------------------------
run-shell ~/.tmux/plugins/tpm/tpm
